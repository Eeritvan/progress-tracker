version: "3.9"

services:
  client:
    build: ./client
    container_name: client
    ports:
      - "5173:80"
    depends_on:
      - users-service
      - data-service
    environment:
      - APP_USERS_SVC=http://users-service:3000
      - APP_DATA_SVC=http://data-service:3000

  users-service:
    build: ./users-service
    container_name: users-svc
    environment:
      - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@users-db:5432/postgres
      - JWT_KEY=${JWT_KEY}
      - PORT=3000
    depends_on:
      - users-db
    restart: on-failure

  data-service:
    build: ./data-service
    container_name: data-svc
    environment:
      - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@data-db:5432/postgres
      - JWT_KEY=${JWT_KEY}
      - PORT=3000
    depends_on:
      - data-db
    restart: on-failure

  users-db:
    image: postgres:alpine
    container_name: users-db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  data-db:
    image: postgres:alpine
    container_name: data-db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
